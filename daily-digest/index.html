<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Digest · 聚合页</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    :root {
      --bg: #090c12;
      --bg-soft: #121723;
      --panel: rgba(17, 24, 39, 0.72);
      --panel-strong: rgba(15, 23, 42, 0.88);
      --line: rgba(255, 255, 255, 0.12);
      --text: #ecf2ff;
      --muted: #9db0d4;
      --primary: #67e8f9;
      --primary-2: #a78bfa;
      --accent: #fbbf24;
      --danger: #fb7185;
      --good: #34d399;
      --shadow: 0 12px 40px rgba(1, 9, 24, 0.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: radial-gradient(1200px 600px at 90% -10%, rgba(103, 232, 249, 0.22), transparent),
                  radial-gradient(1000px 500px at -10% 10%, rgba(167, 139, 250, 0.22), transparent),
                  linear-gradient(180deg, #070a10 0%, #090c12 100%);
      color: var(--text);
      min-height: 100%;
    }

    body {
      padding: 28px 18px 56px;
      font-family: 'Noto Serif SC', serif;
      line-height: 1.58;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.08) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
      opacity: 0.16;
      mix-blend-mode: soft-light;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
    }

    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(120deg, rgba(17, 24, 39, 0.82), rgba(17, 24, 39, 0.56));
      box-shadow: var(--shadow);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }

    .kicker {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--primary);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.4vw, 2.2rem);
      line-height: 1.18;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label,
    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    input[type="date"],
    input[type="search"] {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      color: var(--text);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      transition: transform .16s ease, border-color .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(103, 232, 249, 0.75);
    }

    .summary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      background: rgba(255,255,255,0.03);
    }

    .badge.primary { border-color: rgba(103, 232, 249, .45); color: #bbf7fe; }
    .badge.good { border-color: rgba(52, 211, 153, .45); color: #bbf7d0; }
    .badge.warn { border-color: rgba(251, 191, 36, .45); color: #fde68a; }

    .must-read {
      margin-top: 14px;
      border: 1px dashed rgba(103, 232, 249, .45);
      border-radius: 12px;
      padding: 12px;
      background: rgba(7, 89, 133, 0.12);
    }

    .must-read h2 {
      margin: 0 0 8px;
      font-size: 15px;
      font-family: 'IBM Plex Mono', monospace;
      color: #bbf7fe;
    }

    .must-read ol {
      margin: 0;
      padding-left: 18px;
    }

    .must-read li {
      margin-bottom: 6px;
      font-size: 14px;
    }

    .section {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      border-bottom: 1px solid var(--line);
    }

    .section h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: .01em;
    }

    .section small {
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-strong);
      padding: 10px;
      transition: transform .16s ease, border-color .16s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(167, 139, 250, .6);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .tag {
      border: 1px solid rgba(103, 232, 249, .45);
      color: #bbf7fe;
      border-radius: 999px;
      padding: 1px 8px;
      white-space: nowrap;
    }

    .repo-tag {
      border-color: rgba(251, 191, 36, .5);
      color: #fde68a;
    }

    .item h3 {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.35;
    }

    .item p { margin: 0 0 6px; font-size: 13px; color: #d3ddf0; }

    .muted { color: var(--muted); }

    a { color: #7dd3fc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .archive-links {
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .archive-links a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      background: rgba(255,255,255,.03);
    }

    .empty, .warn {
      padding: 14px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .warn { color: #fda4af; }

    @media (max-width: 860px) {
      .toolbar { grid-template-columns: 1fr; }
      .summary { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="kicker">OPENCLAW • DATA FEED</div>
      <h1>🧭 Daily Digest <span class="muted" style="font-size:14px;font-family:'IBM Plex Mono',monospace;">JSON-Driven</span></h1>
      <div class="subtitle">数据生产与渲染分离：OpenClaw 仅写 JSON，页面只做读取与展示。</div>

      <div class="toolbar">
        <div class="controls">
          <label for="dateInput">日期</label>
          <input id="dateInput" type="date" />
          <button id="loadBtn">加载</button>
          <button id="latestBtn">最新</button>
          <input id="searchInput" type="search" placeholder="搜索标题 / 关键词" />
          <span id="status">就绪</span>
        </div>
        <div id="summary" class="summary"></div>
      </div>

      <section class="must-read">
        <h2>⚡ 今日 3 条必看</h2>
        <ol id="mustReadList"><li class="muted">等待数据...</li></ol>
      </section>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>📰 新闻</h2>
        <small id="newsDate">数据日期：-</small>
      </div>
      <div id="news" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>🏆 GitHub 总榜</h2>
        <small id="generalDate">数据日期：-</small>
      </div>
      <div id="general" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>🤖 GitHub AI 专项</h2>
        <small id="aiDate">数据日期：-</small>
      </div>
      <div id="ai" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>📅 历史索引</h2>
        <small>点击日期回看</small>
      </div>
      <div id="archive" class="archive-links"></div>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(location.search);
    const dateInQuery = qs.get('date');

    const els = {
      dateInput: document.getElementById('dateInput'),
      loadBtn: document.getElementById('loadBtn'),
      latestBtn: document.getElementById('latestBtn'),
      searchInput: document.getElementById('searchInput'),
      status: document.getElementById('status'),
      summary: document.getElementById('summary'),
      mustReadList: document.getElementById('mustReadList'),
      newsDate: document.getElementById('newsDate'),
      generalDate: document.getElementById('generalDate'),
      aiDate: document.getElementById('aiDate'),
      news: document.getElementById('news'),
      general: document.getElementById('general'),
      ai: document.getElementById('ai'),
      archive: document.getElementById('archive')
    };

    let currentBundle = null;

    if (dateInQuery) els.dateInput.value = dateInQuery;

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function briefTime(t) {
      if (!t) return '';
      const m = String(t).match(/(\d{2}:\d{2})/);
      return m ? m[1] : String(t).slice(0, 16);
    }

    async function fetchJson(url) {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`${url} -> ${r.status}`);
      return r.json();
    }

    function cardNews(n) {
      return `<article class="item" data-text="${esc(`${n.title} ${n.summary} ${n.category}`).toLowerCase()}">
        <div class="meta"><span class="tag">${esc(n.category)}</span><span>${esc(briefTime(n.time))}</span></div>
        <h3><a href="${esc(n.url || '#')}" target="_blank" rel="noopener">${esc(n.title)}</a></h3>
        <p>${esc(n.summary || '')}</p>
        <small class="muted">来源：${esc(n.source || '')}</small>
      </article>`;
    }

    function cardRepo(p) {
      return `<article class="item" data-text="${esc(`${p.name} ${p.description} ${p.language}`).toLowerCase()}">
        <div class="meta"><span class="tag repo-tag">${esc(p.language || 'repo')}</span><span>⭐ ${esc(p.stars || '-')}</span></div>
        <h3><a href="${esc(p.url || '#')}" target="_blank" rel="noopener">${esc(p.name)}</a></h3>
        <p>${esc(p.description || '')}</p>
      </article>`;
    }

    function renderSummary(bundle) {
      const badges = [
        ['primary', `日期 ${bundle.date}`],
        ['good', `新闻 ${bundle.stats?.news ?? 0}`],
        ['warn', `总榜 ${bundle.stats?.githubGeneral ?? 0}`],
        ['warn', `AI ${bundle.stats?.githubAi ?? 0}`],
        ['primary', `生成 ${new Date(bundle.generatedAt).toLocaleString('zh-CN', { hour12: false })}`]
      ];
      els.summary.innerHTML = badges.map(([cls, txt]) => `<span class="badge ${cls}">${esc(txt)}</span>`).join('');
    }

    function renderList(container, html) {
      container.innerHTML = html && html.length ? html : '<p class="empty">暂无数据</p>';
    }

    function renderMustRead(bundle) {
      const picks = [];
      if (bundle.github?.general?.length) picks.push({ type: 'repo', title: bundle.github.general[0].name, url: bundle.github.general[0].url });
      if (bundle.news?.length) picks.push({ type: 'news', title: bundle.news[0].title, url: bundle.news[0].url });
      if (bundle.github?.ai?.length) picks.push({ type: 'ai', title: bundle.github.ai[0].name, url: bundle.github.ai[0].url });

      if (!picks.length) {
        els.mustReadList.innerHTML = '<li class="muted">暂无可推荐内容</li>';
        return;
      }

      els.mustReadList.innerHTML = picks.map(p => {
        const icon = p.type === 'repo' ? '🏆' : (p.type === 'ai' ? '🤖' : '📰');
        return `<li>${icon} <a href="${esc(p.url || '#')}" target="_blank" rel="noopener">${esc(p.title)}</a></li>`;
      }).join('');
    }

    function renderBundle(bundle) {
      currentBundle = bundle;
      renderSummary(bundle);
      renderMustRead(bundle);

      els.newsDate.textContent = `数据日期：${bundle.source?.news?.usedDate || bundle.date || '-'}`;
      els.generalDate.textContent = `数据日期：${bundle.source?.github?.usedDate || bundle.date || '-'}`;
      els.aiDate.textContent = `数据日期：${bundle.source?.github?.usedDate || bundle.date || '-'}`;

      renderList(els.news, (bundle.news || []).map(cardNews).join(''));
      renderList(els.general, (bundle.github?.general || []).map(cardRepo).join(''));
      renderList(els.ai, (bundle.github?.ai || []).map(cardRepo).join(''));

      applySearch(els.searchInput.value || '');
    }

    function applySearch(keyword) {
      const q = String(keyword || '').trim().toLowerCase();
      const cards = document.querySelectorAll('[data-text]');
      cards.forEach(card => {
        const text = card.getAttribute('data-text') || '';
        card.style.display = (!q || text.includes(q)) ? '' : 'none';
      });
    }

    async function loadArchive() {
      try {
        const idx = await fetchJson('./data/index.json');
        const dates = Array.isArray(idx.dates) ? idx.dates : [];
        if (!dates.length) {
          els.archive.innerHTML = '<span class="empty">暂无历史数据</span>';
          return;
        }
        els.archive.innerHTML = dates.slice(0, 40).map(d =>
          `<a href="?date=${encodeURIComponent(d)}">${esc(d)}</a>`
        ).join('');
      } catch (e) {
        els.archive.innerHTML = `<span class="warn">历史索引加载失败：${esc(e.message)}</span>`;
      }
    }

    async function load(date) {
      try {
        els.status.textContent = '加载中...';
        let bundle;
        if (date) {
          bundle = await fetchJson(`./data/${date}.json`);
          history.replaceState(null, '', `?date=${encodeURIComponent(date)}`);
        } else {
          bundle = await fetchJson('./data/latest.json');
          history.replaceState(null, '', location.pathname);
          els.dateInput.value = bundle.date || '';
        }
        renderBundle(bundle);
        els.status.textContent = '已更新';
      } catch (e) {
        els.status.textContent = '加载失败';
        els.summary.innerHTML = `<span class="warn">数据加载失败：${esc(e.message)}</span>`;
        renderList(els.news, '');
        renderList(els.general, '');
        renderList(els.ai, '');
        els.mustReadList.innerHTML = '<li class="warn">无法生成推荐，数据加载失败</li>';
      }
    }

    els.loadBtn.addEventListener('click', () => load(els.dateInput.value || null));
    els.latestBtn.addEventListener('click', () => load(null));
    els.searchInput.addEventListener('input', (e) => applySearch(e.target.value));

    loadArchive();
    load(dateInQuery || null);
  </script>
</body>
</html>
